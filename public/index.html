  textarea{font-family:inherit;resize:vertical}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#c4b5fd;border-radius:4px}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn .3s ease}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .pulse{animation:pulse .5s ease}
  .spin{animation:spin 1s linear infinite}

  /* ── Unique Button Animations ── */
  @keyframes rippleOut{0%{transform:scale(0);opacity:.6}100%{transform:scale(4);opacity:0}}
  @keyframes shockwave{0%{box-shadow:0 0 0 0px #6c3bfb88}50%{box-shadow:0 0 0 12px #6c3bfb22}100%{box-shadow:0 0 0 20px #6c3bfb00}}
  @keyframes glowPop{0%{filter:brightness(1)}40%{filter:brightness(1.35)}100%{filter:brightness(1)}}
  @keyframes jelly{0%{transform:scale(1)}25%{transform:scaleX(.88) scaleY(1.12)}50%{transform:scaleX(1.08) scaleY(.94)}75%{transform:scaleX(.97) scaleY(1.03)}100%{transform:scale(1)}}
  @keyframes magneticPull{0%{transform:scale(1)}30%{transform:scale(.9) rotate(-2deg)}60%{transform:scale(1.06) rotate(1deg)}100%{transform:scale(1) rotate(0)}}
  @keyframes particle1{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(-18px,-22px) scale(0);opacity:0}}
  @keyframes particle2{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(20px,-18px) scale(0);opacity:0}}
  @keyframes particle3{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(16px,20px) scale(0);opacity:0}}
  @keyframes particle4{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(-20px,16px) scale(0);opacity:0}}
  @keyframes stampPress{0%{transform:scale(1)}20%{transform:scale(.82)}60%{transform:scale(1.07)}100%{transform:scale(1)}}
  .btn-jelly{animation:jelly .45s cubic-bezier(.4,0,.2,1)}
  .btn-magnetic{animation:magneticPull .4s cubic-bezier(.4,0,.2,1)}
  .btn-stamp{animation:stampPress .35s cubic-bezier(.4,0,.2,1)}
  .btn-glow{animation:glowPop .35s ease}
  .btn-shock{animation:shockwave .5s ease-out}

// ─── Real SEO Analyzer ───────────────────────────────────────────────────────
function analyzeKeywords(text="", platform, data={}) {
  const fullText = typeof data === "object" ? Object.values(data).join(" ") : text;
  const title = data.title || "";
  const description = data.description || data.caption || data.post || data.tweet || "";
  const tags = data.tags || data.hashtags || data.keywords || "";

  const hashtags = (tags.match(/#\w+/g) || tags.split(/[,\s]+/).filter(t=>t.length>1) || []);
  const hashCount = hashtags.length;
  const hasEmoji = /\p{Emoji}/u.test(fullText);
  const wordCount = description.split(/\s+/).filter(w=>w.length>2).length;
  const charCount = description.length;
  const titleLen = title.length;

  const platformLimits = {instagram:2200,youtube:5000,facebook:63206,twitter:280,linkedin:3000,tiktok:2200,pinterest:500};
  const limit = platformLimits[platform] || 2200;

  // Platform-specific real scoring
  let scores = {};
  let suggestions = [];

  if (platform === "youtube") {
    // Title score (0-30)
    let titleScore = 0;
    if (titleLen >= 40 && titleLen <= 60) { titleScore = 30; }
    else if (titleLen >= 30 && titleLen < 40) { titleScore = 20; suggestions.push("📝 Title should be 40-60 chars for best CTR (currently " + titleLen + ")"); }
    else if (titleLen > 60) { titleScore = 15; suggestions.push("✂️ Title too long (" + titleLen + " chars) — YouTube truncates after 60"); }
    else { titleScore = 5; suggestions.push("📝 Title too short — aim for 40-60 chars with main keyword"); }
    // Has number in title?
    if (/\d/.test(title)) titleScore = Math.min(30, titleScore + 5);
    else suggestions.push("🔢 Add a number to title (e.g. '5 Ways...') — boosts CTR by 36%");
    // Question or power word?
    if (/how|why|what|best|top|secret|proven|ultimate/i.test(title)) titleScore = Math.min(30, titleScore + 3);
    else suggestions.push("💡 Add power word to title: 'Best', 'How', 'Top', 'Ultimate'");

    // Description score (0-35)
    let descScore = 0;
    if (wordCount >= 150) { descScore = 35; }
    else if (wordCount >= 80) { descScore = 25; suggestions.push("📄 Description has " + wordCount + " words — aim for 150+ for SEO"); }
    else if (wordCount >= 30) { descScore = 12; suggestions.push("📄 Description too short (" + wordCount + " words) — need 150+ words"); }
    else { descScore = 0; suggestions.push("⚠️ Add a detailed description (150+ words) — critical for YouTube SEO"); }
    // Keyword in first 100 chars?
    if (description.slice(0,100).toLowerCase().split(/\s+/).length > 5) descScore = Math.min(35, descScore + 3);

    // Tags score (0-25)
    let tagScore = 0;
    const tagArr = tags.split(",").map(t=>t.trim()).filter(t=>t.length>0);
    if (tagArr.length >= 12) { tagScore = 25; }
    else if (tagArr.length >= 7) { tagScore = 18; suggestions.push("🏷️ Add more tags (" + tagArr.length + "/15) — use 12-15 tags"); }
    else if (tagArr.length >= 3) { tagScore = 10; suggestions.push("🏷️ Only " + tagArr.length + " tags — YouTube recommends 12-15"); }
    else { tagScore = 0; suggestions.push("🏷️ Add 12-15 comma-separated tags for discoverability"); }

    // Emoji/engagement (0-10)
    let engScore = hasEmoji ? 7 : 3;
    if (!hasEmoji) suggestions.push("😊 Add emojis to description — improves readability & click rate");

    scores = { titleScore: Math.round((titleScore/30)*100), descScore: Math.round((descScore/35)*100), tagScore: Math.round((tagScore/25)*100), engScore: Math.round((engScore/10)*100) };
    const overall = Math.round(titleScore + descScore + tagScore + engScore);
    return { overall: Math.min(100, overall), ...scores, hashtags: hashCount, charCount, limit, suggestions };

  } else if (platform === "instagram") {
    const captionLen = charCount;
    let captionScore = captionLen >= 138 && captionLen <= 300 ? 35 : captionLen >= 50 ? 20 : 5;
    if (captionLen < 138) suggestions.push("📝 Caption too short — 138-300 chars is ideal for Instagram");
    if (captionLen > 300) suggestions.push("✂️ Caption too long — first 125 chars are shown before 'more'");
    let hashScore2 = hashCount >= 20 ? 35 : hashCount >= 10 ? 22 : hashCount >= 5 ? 12 : 3;
    if (hashCount < 20) suggestions.push("# Use " + hashCount + " hashtags — Instagram recommends 20-30 for reach");
    let emojiScore = hasEmoji ? 20 : 5;
    if (!hasEmoji) suggestions.push("😊 Add emojis — Instagram captions with emojis get 48% more engagement");
    let hookScore = description.split(/[.!?]/)[0]?.length <= 80 ? 10 : 5;
    if (hookScore < 10) suggestions.push("🎯 First sentence too long — hook should be under 80 chars");
    const overall = Math.min(100, captionScore + hashScore2 + emojiScore + hookScore);
    scores = { captionScore: Math.round((captionScore/35)*100), hashScore: Math.round((hashScore2/35)*100), emojiScore: Math.round((emojiScore/20)*100), hookScore: Math.round((hookScore/10)*100) };
    return { overall, ...scores, hashtags: hashCount, charCount, limit, suggestions };

  } else if (platform === "twitter") {
    let lenScore = charCount <= 100 ? 40 : charCount <= 200 ? 30 : charCount <= 280 ? 20 : 0;
    if (charCount > 100) suggestions.push("✂️ Tweets under 100 chars get 17% more engagement (yours: " + charCount + ")");
    if (charCount > 280) suggestions.push("🚫 Over Twitter's 280 char limit!");
    let hashScore2 = hashCount <= 2 ? 30 : hashCount <= 4 ? 15 : 5;
    if (hashCount > 2) suggestions.push("# Use max 2 hashtags — more reduces engagement on Twitter/X");
    let emojiScore = hasEmoji ? 20 : 8;
    if (!hasEmoji) suggestions.push("😊 Tweets with emojis get 25% more engagement");
    let hookScore = /\?|!|→|🔥|💡/.test(description.slice(0,30)) ? 10 : 3;
    if (hookScore < 10) suggestions.push("🎯 Open with a question or hook in first 30 chars");
    const overall = Math.min(100, lenScore + hashScore2 + emojiScore + hookScore);
    scores = { lengthScore: Math.round((lenScore/40)*100), hashScore: Math.round((hashScore2/30)*100), emojiScore: Math.round((emojiScore/20)*100) };
    return { overall, ...scores, hashtags: hashCount, charCount, limit, suggestions };

  } else if (platform === "linkedin") {
    let lenScore = wordCount >= 200 && wordCount <= 400 ? 35 : wordCount >= 100 ? 22 : wordCount >= 50 ? 10 : 3;
    if (wordCount < 200) suggestions.push("📄 Post has " + wordCount + " words — LinkedIn favors 200-400 words");
    let hashScore2 = hashCount >= 3 && hashCount <= 5 ? 25 : hashCount >= 1 ? 15 : 0;
    if (hashCount < 3) suggestions.push("# Add 3-5 hashtags — optimal for LinkedIn algorithm");
    if (hashCount > 5) suggestions.push("# Reduce to 3-5 hashtags — too many looks spammy on LinkedIn");
    let hookScore = description.split("\n")[0]?.length <= 100 ? 25 : 10;
    if (hookScore < 25) suggestions.push("🎯 First line is your hook — keep it under 100 chars to prevent truncation");
    let emojiScore = hasEmoji ? 15 : 5;
    const overall = Math.min(100, lenScore + hashScore2 + hookScore + emojiScore);
    scores = { lengthScore: Math.round((lenScore/35)*100), hashScore: Math.round((hashScore2/25)*100), hookScore: Math.round((hookScore/25)*100) };
    return { overall, ...scores, hashtags: hashCount, charCount, limit, suggestions };

  } else if (platform === "tiktok") {
    let lenScore = charCount <= 100 ? 40 : charCount <= 150 ? 25 : 10;
    if (charCount > 100) suggestions.push("✂️ TikTok caption should be under 100 chars (yours: " + charCount + ")");
    let hashScore2 = hashCount >= 5 && hashCount <= 10 ? 35 : hashCount >= 3 ? 20 : 5;
    if (hashCount < 5) suggestions.push("# Use 5-10 hashtags including #FYP and #ForYou");
    if (hashCount > 10) suggestions.push("# Reduce to 5-10 hashtags for TikTok");
    let hookScore = hasEmoji ? 15 : 5;
    if (!hasEmoji) suggestions.push("😊 Use emojis — essential for TikTok captions");
    const overall = Math.min(100, lenScore + hashScore2 + hookScore);
    scores = { lengthScore: Math.round((lenScore/40)*100), hashScore: Math.round((hashScore2/35)*100) };
    return { overall, ...scores, hashtags: hashCount, charCount, limit, suggestions };

  } else if (platform === "facebook") {
    let lenScore = charCount >= 40 && charCount <= 80 ? 40 : charCount >= 20 ? 25 : 10;
    if (charCount > 80) suggestions.push("✂️ Facebook posts under 80 chars get 66% more engagement (yours: " + charCount + ")");
    let hashScore2 = hashCount >= 5 && hashCount <= 10 ? 30 : hashCount >= 2 ? 18 : 5;
    if (hashCount < 5) suggestions.push("# Add 5-10 hashtags for Facebook reach");
    let emojiScore = hasEmoji ? 20 : 5;
    if (!hasEmoji) suggestions.push("😊 Add emojis to your Facebook post");
    let questionScore = /\?/.test(description) ? 10 : 3;
    if (!(/\?/.test(description))) suggestions.push("❓ End with a question to drive comments");
    const overall = Math.min(100, lenScore + hashScore2 + emojiScore + questionScore);
    scores = { lengthScore: Math.round((lenScore/40)*100), hashScore: Math.round((hashScore2/30)*100) };
    return { overall, ...scores, hashtags: hashCount, charCount, limit, suggestions };

  } else if (platform === "pinterest") {
    let titleScore = titleLen >= 40 && titleLen <= 100 ? 30 : titleLen >= 20 ? 18 : 5;
    if (titleLen < 40) suggestions.push("📝 Pinterest title too short — aim for 40-100 chars with keywords");
    let descScore = charCount >= 100 && charCount <= 500 ? 35 : charCount >= 50 ? 20 : 5;
    if (charCount < 100) suggestions.push("📄 Description needs 100-500 chars for Pinterest SEO");
    let kwScore = hashCount >= 8 ? 25 : hashCount >= 4 ? 15 : 5;
    if (hashCount < 8) suggestions.push("🔑 Add 8-10 keywords — Pinterest is a search engine");
    let emojiScore = hasEmoji ? 10 : 3;
    const overall = Math.min(100, titleScore + descScore + kwScore + emojiScore);
    scores = { titleScore: Math.round((titleScore/30)*100), descScore: Math.round((descScore/35)*100), kwScore: Math.round((kwScore/25)*100) };
    return { overall, ...scores, hashtags: hashCount, charCount, limit, suggestions };
  }

  // Fallback
  const overall = Math.min(100, 50 + (hashCount * 3) + (hasEmoji ? 10 : 0) + Math.min(20, wordCount/5));
  return { overall, hashtags: hashCount, charCount, limit, suggestions };
}

function seoGrade(score) {
  if(score>=85) return {label:"Excellent",color:"#22c55e"};
  if(score>=70) return {label:"Good",color:"#3b82f6"};
  if(score>=50) return {label:"Fair",color:"#f59e0b"};
  return {label:"Needs Work",color:"#ef4444"};
}

// Shared prompt builder
function buildPrompt(topic, platformList, language, imageContext) {
  return `${imageContext ? "Image analysis: " + imageContext + "\n\n" : ""}Generate highly optimized social media content for: ${platformList}.
Topic: "${topic}"
Language: ${language}

Return ONLY valid JSON (no markdown, no code fences, no extra text):
{
  "instagram":{"caption":"...","hashtags":"..."},
  "youtube":{"title":"...","description":"...","tags":"..."},
  "facebook":{"caption":"...","hashtags":"..."},
  "twitter":{"tweet":"...","hashtags":"..."},
  "linkedin":{"post":"...","hashtags":"..."},
  "tiktok":{"caption":"...","hashtags":"..."},
  "pinterest":{"title":"...","description":"...","keywords":"..."}
}
Rules:
- Instagram: emoji-rich caption 150-200 chars + 25 hashtags (trending + niche mix)
- YouTube: SEO title max 70 chars + 300-word description + 15 comma-separated tags
- Facebook: shareable caption + 8 hashtags
- Twitter: viral tweet max 280 chars + 4 hashtags
- LinkedIn: professional storytelling 200-300 words + 5 hashtags
- TikTok: catchy caption under 100 chars + 10 trending hashtags
- Pinterest: SEO title + 150-char description + 10 comma-separated keywords
- If Hindi: Devanagari script for content, English hashtags
- Only include platforms: ${platformList}
- Make content genuinely engaging and platform-specific`;
}

function parseAIResponse(raw) {
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error("AI ne valid response nahi diya. Dobara try karo.");
  return JSON.parse(match[0]);
}

// STEP 1: Vercel Function se image analyze karwao (Gemini — key safe hai server pe)
async function analyzeImageWithGemini(imageBase64) {
  const res = await fetch(`${API_BASE}/api/analyze-image`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ imageBase64 })
  });
  const data = await res.json();
  if (data.error) throw new Error("Image analysis failed: " + data.error);
  return data.description || "";
}

// STEP 2: Vercel Function se content generate karwao (Groq — key safe hai server pe)
async function generateWithGroq(topic, platforms, language, imageContext) {
  const res = await fetch(`${API_BASE}/api/generate`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ topic, platforms, language, imageContext })
  });
  const data = await res.json();
  if (data.error) throw new Error("Content generation failed: " + data.error);
  return data;
}

// MAIN: Image → Gemini vision → Groq content / No image → Groq directly
async function generateContent(topic, platforms, language, imageBase64) {
  const platformList = platforms.join(", ");
  let imageContext = "";

  if (imageBase64) {
    // Step 1: Gemini analyzes the image
    imageContext = await analyzeImageWithGemini(imageBase64);
  }

  // Step 2: Groq generates content (with or without image context)
  return await generateWithGroq(topic, platforms, language, imageContext);
}

// ── Animated Button ────────────────────────────────────────────────────────────
function AnimBtn({onClick, children, style, title, type="primary", disabled}) {
  const btnRef = useRef(null);

  const configs = {
    primary:   { color: "#6c3bfb", particles: ["#6c3bfb","#a78bfa","#c4b5fd","#8b5cf6","#7c3aed"] },
    secondary: { color: "#6c3bfb", particles: ["#6c3bfb","#38bdf8","#22c55e","#818cf8"] },
    icon:      { color: "#6c3bfb", particles: ["#6c3bfb","#f59e0b","#fbbf24"] },
    copy:      { color: "#22c55e", particles: ["#22c55e","#34d399","#6ee7b7","#a7f3d0"] },
    save:      { color: "#E60023", particles: ["#E60023","#f87171","#fbbf24","#fb923c"] },
    danger:    { color: "#ef4444", particles: ["#ef4444","#f87171","#fca5a5"] },
  };

  const handleClick = (e) => {
    if (disabled) return;
    const btn = btnRef.current;
    if (!btn) { onClick && onClick(e); return; }

    const cfg = configs[type] || configs.primary;
    const rect = btn.getBoundingClientRect();
    const cx = e.clientX;
    const cy = e.clientY;

    // 1. Button scale bounce using inline style sequence
    btn.style.transition = "transform 0.08s ease";
    btn.style.transform = "scale(0.85)";
    setTimeout(() => {
      btn.style.transform = "scale(1.07)";
      btn.style.transition = "transform 0.12s ease";
    }, 80);
    setTimeout(() => {
      btn.style.transform = "scale(0.97)";
      btn.style.transition = "transform 0.08s ease";
    }, 190);
    setTimeout(() => {
      btn.style.transform = "scale(1)";
      btn.style.transition = "transform 0.1s ease";
    }, 270);

    // 2. Ripple inside button
    const ripple = document.createElement("span");
    const rx = e.clientX - rect.left;
    const ry = e.clientY - rect.top;
    ripple.style.cssText = `
      position:absolute;left:${rx}px;top:${ry}px;
      width:4px;height:4px;margin-left:-2px;margin-top:-2px;
      border-radius:50%;background:${cfg.color}99;
      pointer-events:none;z-index:99;
      transform:scale(1);opacity:0.8;
      transition:transform 0.5s ease-out,opacity 0.5s ease-out;
    `;
    btn.appendChild(ripple);
    requestAnimationFrame(() => {
      ripple.style.transform = "scale(18)";
      ripple.style.opacity = "0";
    });
    setTimeout(() => ripple.remove(), 520);

    // 3. Particles — appended to BODY at fixed screen position (not clipped by button)
    const angles = [0, 60, 120, 180, 240, 300];
    angles.forEach((angle, i) => {
      const rad = (angle * Math.PI) / 180;
      const dist = 35 + Math.random() * 20;
      const tx = Math.cos(rad) * dist;
      const ty = Math.sin(rad) * dist;
      const size = 5 + Math.floor(Math.random() * 5);
      const dot = document.createElement("span");
      dot.style.cssText = `
        position:fixed;
        left:${cx}px;top:${cy}px;
        width:${size}px;height:${size}px;
        margin-left:-${size/2}px;margin-top:-${size/2}px;
        border-radius:50%;
        background:${cfg.particles[i % cfg.particles.length]};
        pointer-events:none;z-index:99999;
        transform:translate(0,0) scale(1);opacity:1;
        transition:transform ${0.4 + i*0.03}s ease-out, opacity ${0.35 + i*0.03}s ease-out;
        transition-delay:${i*15}ms;
      `;
      document.body.appendChild(dot);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          dot.style.transform = `translate(${tx}px,${ty}px) scale(0)`;
          dot.style.opacity = "0";
        });
      });
      setTimeout(() => dot.remove(), 500 + i * 30);
    });

    onClick && onClick(e);
  };

  return (
    <button
      ref={btnRef}
      title={title}
      disabled={disabled}
      onClick={handleClick}
      style={{ ...style, position: "relative", overflow: "hidden", cursor: disabled ? "default" : "pointer" }}
    >
      {children}
    </button>
  );
}

const CREDITS_KEY   = "sg_credits";
const COOLDOWN_KEY  = "sg_ad_cooldown";
const FREE_CREDITS  = 2;   // first visit
const AD_REWARD     = 2;   // credits per ad
const COST_PER_GEN  = 2;   // credits per generation
const AD_COOLDOWN   = 60;  // seconds between ads
const AD_WATCH_TIME = 8;   // seconds to watch ad

function getCredits() {
  try {
    const raw = localStorage.getItem(CREDITS_KEY);
    if (raw === null) {
      // First visit — give free credits
      localStorage.setItem(CREDITS_KEY, String(FREE_CREDITS));
      return FREE_CREDITS;
    }
    return parseInt(raw) || 0;
  } catch { return 0; }
}

function setCredits(n) {
  try { localStorage.setItem(CREDITS_KEY, String(Math.max(0, n))); } catch {}
}

function getCooldownLeft() {
  try {
    const last = parseInt(localStorage.getItem(COOLDOWN_KEY) || "0");
    const diff = AD_COOLDOWN - Math.floor((Date.now() - last) / 1000);
    return diff > 0 ? diff : 0;
  } catch { return 0; }
}

function setCooldownNow() {
  try { localStorage.setItem(COOLDOWN_KEY, String(Date.now())); } catch {}
}

function AdModal({ onClose, onReward, dark }) {
  const [phase, setPhase]       = useState("watching");
  const [timeLeft, setTimeLeft] = useState(AD_WATCH_TIME);
  const adClicked = React.useRef(false); // track if user clicked the ad

  // Inject Adwixo ad script directly into the page (not iframe)
  React.useEffect(() => {
    const container = document.getElementById("adwixo-ad-slot");
    if (!container) return;
    container.innerHTML = "";

    // Create script tag and append directly
    const script = document.createElement("script");
    script.src = `https://adwixo.com/teg/js/interwixo.js?cb=${Date.now()}`;
    script.setAttribute("zone", "98686");
    script.async = true;
    container.appendChild(script);

    return () => {
      if (container) container.innerHTML = "";
    };
  }, []);

  // When user clicks ad (window loses focus) and comes back → give reward immediately
  React.useEffect(() => {
    let wentToAd = false;

    const onBlur = () => {
      if (phase === "watching") wentToAd = true;
    };

    const onFocus = () => {
      if (wentToAd && phase === "watching") {
        wentToAd = false;
        adClicked.current = true;
        setPhase("done"); // ✅ reward immediately on return
      }
    };

    window.addEventListener("blur", onBlur);
    window.addEventListener("focus", onFocus);
    return () => {
      window.removeEventListener("blur", onBlur);
      window.removeEventListener("focus", onFocus);
    };
  }, [phase]);

  // Countdown timer — when done, check if ad was clicked

  React.useEffect(() => {
    if (phase !== "watching") return;
    if (timeLeft <= 0) {
      // Time up — check if user clicked the ad
      if (adClicked.current) {
        setPhase("done");
      } else {
        setPhase("notclicked");
      }
      return;
    }
    const t = setTimeout(() => setTimeLeft(s => s - 1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft, phase]);

  const claim = () => {
    setCredits(getCredits() + AD_REWARD);
    setCooldownNow();
    onReward(AD_REWARD);
    onClose();
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:9999,background:"#000",display:"flex",flexDirection:"column"}}>

      {phase === "watching" && (
        <>
          {/* Ad — fills entire screen */}

            {/* Direct ad slot — script injected here */}
            <div id="adwixo-ad-slot" style={{position:"absolute",inset:0,width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}/>
            {/* Placeholder shown while ad loads */}
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none",zIndex:-1}}>
              <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#222" strokeWidth="1"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
              <div style={{fontSize:12,color:"#222",marginTop:12,letterSpacing:2}}>AD LOADING…</div>
            </div>
            </div>

            {/* Timer + Cancel — overlay at bottom center */}
            <div style={{position:"absolute",bottom:20,left:0,right:0,zIndex:10,display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
              <button onClick={onClose} style={{background:"#000000bb",backdropFilter:"blur(8px)",border:"1px solid #ffffff22",borderRadius:10,padding:"8px 16px",color:"#aaa",fontSize:13,cursor:"pointer"}}>
                Cancel
              </button>
              <div style={{width:46,height:46,borderRadius:"50%",background:"#000000bb",backdropFilter:"blur(8px)",border:"2px solid #6c3bfb",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 0 14px #6c3bfb77"}}>
                <span style={{fontSize:18,fontWeight:900,color:"#6c3bfb"}}>{timeLeft}</span>
              </div>
              <div style={{background:"#000000bb",backdropFilter:"blur(8px)",border:"1px solid #6c3bfb33",borderRadius:10,padding:"8px 12px",fontSize:11,color:"#6c3bfb",fontWeight:700}}>
                Tap ad to earn
              </div>
            </div>
          </div>
        </>
      )}

      {phase === "done" && (
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#000",padding:32}}>
          <div style={{width:90,height:90,borderRadius:"50%",background:"#22c55e15",border:"2px solid #22c55e44",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:24,boxShadow:"0 0 30px #22c55e44"}}>

          <AnimBtn onClick={claim} type="primary" style={{width:"100%",maxWidth:300,background:"linear-gradient(135deg,#6c3bfb,#8b5cf6)",color:"#fff",border:"none",borderRadius:18,padding:"16px 0",fontSize:16,fontWeight:900,cursor:"pointer",boxShadow:"0 8px 24px #6c3bfb44"}}>
            Claim Credits →
          </AnimBtn>
        </div>
      )}

      {phase === "notclicked" && (
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#000",padding:32}}>
          <div style={{width:90,height:90,borderRadius:"50%",background:"#f59e0b15",border:"2px solid #f59e0b44",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:24,boxShadow:"0 0 24px #f59e0b33"}}>

    if(cur < COST_PER_GEN){
      setError(`Not enough credits! You need ${COST_PER_GEN} credits. Watch an ad to earn ${AD_REWARD} credits.`);
      return;
    }
    setCredits(cur - COST_PER_GEN);
    refreshCredits();
    setError("");setGenerating(true);
    try {
      const data = await generateContent(topic,selected,language,imageBase64);
      setResults(data);setStep("results");setActivePlatform(selected[0]);
      try {
        const h={id:Date.now(),topic,platforms:selected,results:data,savedAt:new Date().toISOString()};
        const prev=JSON.parse(localStorage.getItem("sg_history")||"[]");
        localStorage.setItem("sg_history",JSON.stringify([h,...prev].slice(0,50)));
      } catch{}
    } catch(e){setError("Generation failed: "+e.message);}
    setGenerating(false);
  };

  const handleRegenerate = async (platform) => {
    setGenerating(true);
    try{const data=await generateContent(topic,[platform],language,imageBase64);setResults(p=>({...p,...data}));}catch{}
    setGenerating(false);
  };

  const copyAll = () => {
    const text=selected.map(pid=>{const d=results?.[pid];return d?`--- ${pid.toUpperCase()} ---\n${Object.values(d).join("\n")}`:""}).join("\n\n");
    navigator.clipboard.writeText(text).catch(()=>{});
  };

  const saveToSaved = () => {
    try{
      const item={id:Date.now(),topic,platforms:selected,results,savedAt:new Date().toISOString()};
      const prev=JSON.parse(localStorage.getItem("sg_saved")||"[]");
      localStorage.setItem("sg_saved",JSON.stringify([item,...prev].slice(0,100)));
      alert("Saved successfully!");
    }catch{}
  };

  const showcaseMap = results ? {
    instagram:<IGPreview {...(results.instagram||{})} img={uploadedImage}/>,
    youtube:  <YTPreview   {...(results.youtube||{})}   img={uploadedImage}/>,
    facebook: <FBPreview  {...(results.facebook||{})}  img={uploadedImage}/>,
    twitter:  <TWPreview  {...(results.twitter||{})}   img={uploadedImage}/>,
    linkedin: <LIPreview  {...(results.linkedin||{})}  img={uploadedImage}/>,
    tiktok:   <TTPreview  {...(results.tiktok||{})}    img={uploadedImage}/>,
    pinterest:<PINPreview {...(results.pinterest||{})} img={uploadedImage}/>,
  } : {};

  const cardStyle = {background:card,borderRadius:16,padding:"14px 16px",marginBottom:12,border:`1px solid ${border}`};
  const labelStyle = {fontWeight:700,fontSize:13,color:sub,marginBottom:8,display:"block"};
  const inputStyle = {width:"100%",border:`1.5px solid ${inpBorder}`,borderRadius:12,padding:"10px 12px",fontSize:14,outline:"none",background:inp,fontFamily:"inherit",boxSizing:"border-box",color:text};

  // ── PLATFORM SELECT ──
  if(step==="platforms") return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden",background:bg}}>
      <CreditBar credits={credits} dark={dark} onWatchAd={()=>setShowAd(true)}/>
      {showAd && <AdModal dark={dark} onClose={()=>{setShowAd(false);refreshCredits();}} onReward={()=>refreshCredits()}/>}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px 12px",borderBottom:`1px solid ${border}`}}>
        <button onClick={()=>setStep("home")} style={{width:36,height:36,borderRadius:12,border:`1px solid ${border}`,background:card,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#6c3bfb",flexShrink:0}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div><div style={{fontWeight:800,fontSize:18,color:text}}>Choose Platforms</div><div style={{fontSize:12,color:sub}}>Select platforms to generate content for</div></div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {PLATFORMS.map(p=>(
            <button key={p.id} onClick={()=>togglePlatform(p.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,padding:16,borderRadius:16,border:`2px solid ${selected.includes(p.id)?p.color:border}`,background:selected.includes(p.id)?p.color+"15":card,cursor:"pointer",position:"relative",transition:"all .2s"}}>
              <Logo pid={p.id} size={44}/>
              <span style={{fontSize:12,fontWeight:700,color:text}}>{p.label}</span>
              {selected.includes(p.id) && <div style={{position:"absolute",top:8,right:8,width:20,height:20,borderRadius:"50%",background:p.color,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
              </div>}
            </button>
          ))}
        </div>
        <button onClick={()=>setSelected(PLATFORMS.map(p=>p.id))} style={{display:"block",margin:"14px auto 0",background:"none",border:"none",color:"#6c3bfb",fontWeight:700,fontSize:14,cursor:"pointer"}}>+ Select All</button>
      </div>
      <div style={{padding:"12px 16px",borderTop:`1px solid ${border}`}}>
        <AnimBtn onClick={handleGenerate} type="primary" disabled={generating||selected.length===0} style={{width:"100%",background:"linear-gradient(135deg,#6c3bfb,#8b5cf6)",color:"#fff",border:"none",borderRadius:16,padding:"15px 24px",fontSize:15,fontWeight:800,cursor:"pointer",opacity:selected.length===0?.5:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {generating
            ? <><svg className="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" strokeOpacity=".4"/><path d="M21 12a9 9 0 00-9-9" strokeLinecap="round"/></svg>Generating…</>
            : <><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z" fill="#fff"/></svg>Generate for {selected.length} Platform{selected.length>1?"s":""}</>}
        </AnimBtn>
      </div>
    </div>
  );

  // ── RESULTS ──
  if(step==="results" && results) return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden",background:bg}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px 12px",borderBottom:`1px solid ${border}`}}>
        <button onClick={()=>setStep("home")} style={{width:36,height:36,borderRadius:12,border:`1px solid ${border}`,background:card,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#6c3bfb",flexShrink:0}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div style={{fontWeight:800,fontSize:18,color:text}}>Results</div>
        {generating && <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#6c3bfb"}}>
          <svg className="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6c3bfb" strokeWidth="2"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" strokeOpacity=".4"/><path d="M21 12a9 9 0 00-9-9" strokeLinecap="round"/></svg>Regenerating…
        </div>}
      </div>
      {/* Tabs */}
      <div style={{display:"flex",margin:"10px 16px 10px",background:dark?"#1a1a1a":"#f5f0ff",borderRadius:12,padding:4}}>
        {[["content","Content",<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4z" strokeLinecap="round"/></svg>],
          ["showcase","Showcase",<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>]].map(([t,label,icon])=>(
          <button key={t} onClick={()=>setActiveTab(t)} style={{flex:1,padding:"8px 0",borderRadius:10,border:"none",cursor:"pointer",background:activeTab===t?"#6c3bfb":"transparent",color:activeTab===t?"#fff":sub,fontWeight:700,fontSize:13,transition:"all .2s",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            {icon}{label}
          </button>
        ))}
      </div>
      {/* Platform pills */}
      <div style={{display:"flex",gap:10,overflowX:"auto",padding:"0 16px 10px",scrollbarWidth:"none"}}>
        {selected.map(pid=>{
          const pdef=PLATFORMS.find(p=>p.id===pid);
          return (
            <button key={pid} onClick={()=>setActivePlatform(pid)} style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:3,border:"none",background:"none",cursor:"pointer"}}>
              <div style={{padding:3,borderRadius:12,border:`2.5px solid ${activePlatform===pid?pdef?.color:"transparent"}`,transition:"border .2s"}}>
                <Logo pid={pid} size={32}/>
              </div>
              <span style={{fontSize:9,fontWeight:700,color:activePlatform===pid?pdef?.color:sub}}>{pdef?.label}</span>
            </button>
          );
        })}
      </div>
      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"0 16px"}}>
        {activeTab==="content"
          ? <ContentCard platform={activePlatform} data={results[activePlatform]} onRegen={handleRegenerate} dark={dark}/>
          : <div>
              {showcaseMap[activePlatform]}
              {selected.filter(p=>p!==activePlatform).length>0 && (
                <div style={{marginTop:16}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#bbb",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Other Platforms — tap to switch</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    {selected.filter(p=>p!==activePlatform).map(pid=>{
                      const pdef=PLATFORMS.find(p2=>p2.id===pid);
                      return (
                        <div key={pid} onClick={()=>setActivePlatform(pid)} style={{cursor:"pointer",borderRadius:12,overflow:"hidden",border:`2px solid ${pdef?.color}44`}}>
                          <div style={{transform:"scale(0.62)",transformOrigin:"top left",width:"161%",pointerEvents:"none"}}>{showcaseMap[pid]}</div>
                          <div style={{background:card,padding:"5px 8px",display:"flex",alignItems:"center",gap:5,borderTop:`1px solid ${pdef?.color}33`}}>
                            <Logo pid={pid} size={14}/><span style={{fontSize:11,fontWeight:700,color:pdef?.color}}>{pdef?.label}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>}
      </div>
      {/* Footer */}
      <div style={{display:"flex",gap:8,padding:"10px 16px",borderTop:`1px solid ${border}`}}>
        <AnimBtn onClick={copyAll} type="copy" style={{flex:1,background:card,color:"#6c3bfb",border:`1.5px solid #6c3bfb44`,borderRadius:16,padding:"10px 0",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy All
        </AnimBtn>
        <AnimBtn onClick={saveToSaved} type="save" style={{flex:1,background:card,color:"#E60023",border:`1.5px solid #E6002344`,borderRadius:16,padding:"10px 0",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>Save
        </AnimBtn>
        <AnimBtn onClick={()=>setStep("platforms")} type="primary" style={{flex:1,background:"linear-gradient(135deg,#6c3bfb,#8b5cf6)",color:"#fff",border:"none",borderRadius:16,padding:"10px 0",fontSize:13,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>Redo
        </AnimBtn>
      </div>
    </div>
  );

  // ── HOME ──
  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden",background:bg}}>
      <CreditBar credits={credits} dark={dark} onWatchAd={()=>setShowAd(true)}/>
      {showAd && <AdModal dark={dark} onClose={()=>{setShowAd(false);refreshCredits();}} onReward={()=>refreshCredits()}/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 18px 6px"}}>
        <button style={{background:"none",border:"none",cursor:"pointer",padding:4,display:"flex",flexDirection:"column",gap:5}}>
          <div style={{width:22,height:2,borderRadius:2,background:text}}/><div style={{width:16,height:2,borderRadius:2,background:text}}/><div style={{width:22,height:2,borderRadius:2,background:text}}/>
        </button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:900,letterSpacing:-.5}}><span style={{color:"#6c3bfb"}}>Socio</span><span style={{color:text}}>Genix</span><span style={{color:"#6c3bfb"}}> AI</span></div>
          <div style={{fontSize:11,color:sub}}>AI-Powered Social Media Generator</div>
        </div>
        <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#f59e0b,#d97706)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M2 17l2-8 5 4 3-7 3 7 5-4 2 8H2z" fill="#fff"/><rect x="2" y="18" width="20" height="2" rx="1" fill="#fff"/></svg>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"10px 16px"}}>
        {/* Topic */}
        <div style={cardStyle}>
          <label style={labelStyle}>Enter your topic *</label>
          <input value={topic} onChange={e=>setTopic(e.target.value.slice(0,200))} placeholder="e.g. 5 Tips to Grow Your Business Online" style={inputStyle}/>
          <div style={{textAlign:"right",fontSize:11,color:"#bbb",marginTop:4}}>{topic.length}/200</div>
        </div>
        {/* Image Upload */}
        <div style={cardStyle}>
          <label style={labelStyle}>Upload Image <span style={{fontWeight:400,color:"#aaa"}}>(Optional — AI will analyze it)</span></label>
          {uploadedImage ? (
            <div style={{position:"relative",borderRadius:12,overflow:"hidden",border:`1.5px solid ${border}`}}>
              <img src={uploadedImage} alt="preview" style={{width:"100%",height:140,objectFit:"cover",display:"block"}}/>
              <button onClick={()=>{setUploadedImage(null);setImageBase64(null);}} style={{position:"absolute",top:8,right:8,width:28,height:28,borderRadius:"50%",background:"#000a",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
              <div style={{position:"absolute",bottom:8,left:10,background:"#6c3bfbcc",color:"#fff",fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,display:"flex",alignItems:"center",gap:4}}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="#fff"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z"/></svg>AI will use image context
              </div>
            </div>
          ) : (
            <label style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,width:"100%",border:`2px dashed ${dark?"#444":"#c4b5fd"}`,borderRadius:12,padding:"20px 16px",background:inp,cursor:"pointer",boxSizing:"border-box"}}>
              <input type="file" accept="image/*" style={{display:"none"}} onChange={handleImagePick}/>
              <div style={{width:44,height:44,borderRadius:"50%",background:"#6c3bfb22",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="#6c3bfb" strokeWidth="2"/><circle cx="8.5" cy="8.5" r="1.5" fill="#6c3bfb"/><path d="M21 15l-5-5L5 21" stroke="#6c3bfb" strokeWidth="2" strokeLinecap="round"/></svg>
              </div>
              <span style={{fontWeight:700,fontSize:13,color:"#6c3bfb"}}>Click to upload image</span>
              <span style={{fontSize:11,color:"#aaa"}}>JPG, PNG, WEBP supported</span>
            </label>
          )}
        </div>
        {/* Language */}
        <div style={cardStyle}>
          <label style={labelStyle}>Language</label>
          <select value={language} onChange={e=>setLanguage(e.target.value)} style={{...inputStyle,cursor:"pointer"}}>
            <option>English</option><option>Hindi</option>
          </select>
        </div>
        {/* Platforms */}
        <div style={cardStyle}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <label style={{...labelStyle,marginBottom:0}}>Platforms</label>
            <button onClick={()=>setSelected(PLATFORMS.map(p=>p.id))} style={{fontSize:11,color:"#6c3bfb",background:"none",border:"none",cursor:"pointer",fontWeight:700}}>Select All</button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {PLATFORMS.map(p=>(
              <button key={p.id} onClick={()=>togglePlatform(p.id)} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:20,border:`1.5px solid ${selected.includes(p.id)?p.color:border}`,background:selected.includes(p.id)?p.color+"15":card,cursor:"pointer"}}>
                <Logo pid={p.id} size={18}/>
                <span style={{fontSize:12,fontWeight:700,color:selected.includes(p.id)?p.color:sub}}>{p.label}</span>
              </button>
            ))}
          </div>
        </div>
        {error && <div style={{color:"#ef4444",fontSize:13,padding:"8px 12px",background:"#fef2f2",borderRadius:10,marginBottom:12,border:"1px solid #fca5a5"}}>{error}</div>}
        <button onClick={handleGenerate} disabled={generating} style={{width:"100%",background:"linear-gradient(135deg,#6c3bfb,#8b5cf6)",color:"#fff",border:"none",borderRadius:16,padding:"15px 24px",fontSize:15,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {generating
            ? <><svg className="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" strokeOpacity=".4"/><path d="M21 12a9 9 0 00-9-9" strokeLinecap="round"/></svg>{imageBase64?"Gemini analyzing → Groq writing…":"Groq generating content…"}</>
            : <><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z" fill="#fff"/></svg>Generate Content</>}
        </button>
        <div style={{textAlign:"center",fontSize:11,color:"#bbb",marginTop:8,marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="#bbb"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z"/></svg>
          AI creates content & real previews for all platforms
        </div>
        {/* Why card */}
        <div style={{background:"linear-gradient(135deg,#4a0fa3,#6c3bfb,#8b5cf6)",borderRadius:20,padding:18,marginBottom:20,color:"#fff"}}>
          <div style={{fontWeight:800,fontSize:15,marginBottom:14}}>Why SocioGenix AI?</div>
          {[["ai","AI-Powered","Unique content for every platform in seconds."],
            ["img","Image Analysis","Upload image — AI reads it for better content."],
            ["eye","Real Previews","See exactly how posts look on each app."],
            ["save","Save & History","Bookmark and revisit your generations."],
            ["lang","Hindi + English","Full multi-language support."]
          ].map(([icon,title,desc])=>(
            <div key={title} style={{display:"flex",gap:10,marginBottom:10}}>
              <div style={{width:34,height:34,borderRadius:10,background:"#ffffff22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {icon==="ai"   && <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.8"><rect x="3" y="8" width="18" height="10" rx="2"/><path d="M8 8V6a4 4 0 018 0v2"/><circle cx="9" cy="13" r="1" fill="#fff"/><circle cx="15" cy="13" r="1" fill="#fff"/></svg>}
                {icon==="img"  && <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5" fill="#fff"/><path d="M21 15l-5-5L5 21" strokeLinecap="round"/></svg>}
                {icon==="eye"  && <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>}
                {icon==="save" && <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.8"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>}
                {icon==="lang" && <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.8"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20" strokeLinecap="round"/></svg>}
              </div>
              <div><div style={{fontWeight:700,fontSize:13}}>{title}</div><div style={{fontSize:11,opacity:.75}}>{desc}</div></div>
            </div>
          ))}
          <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"center"}}>
            {PLATFORMS.map(p=><Logo key={p.id} pid={p.id} size={30}/>)}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── History ────────────────────────────────────────────────────────────────────
function HistoryScreen({dark}) {
  const [history,setHistory] = useState(()=>{try{return JSON.parse(localStorage.getItem("sg_history")||"[]");}catch{return [];}});
  const [expanded,setExpanded] = useState(null);
  const bg=dark?"#0f0f0f":"#fafafa",card=dark?"#1e1e1e":"#fff",border=dark?"#333":"#e8e0ff",text=dark?"#f0f0f0":"#1a1a2e",sub=dark?"#888":"#555";
  const clear=()=>{if(window.confirm("Delete all history?")){localStorage.removeItem("sg_history");setHistory([]);}};
  if(!history.length) return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",alignItems:"center",justifyContent:"center",background:bg}}>
      <div style={{width:72,height:72,borderRadius:20,background:dark?"#2a2a2a":"#f0ebff",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:16}}>
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#6c3bfb" strokeWidth="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      </div>
      <div style={{fontWeight:700,fontSize:18,color:text}}>No History Yet</div>
      <div style={{fontSize:14,color:sub,marginTop:6}}>Generated content will appear here</div>
    </div>
  );
  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden",background:bg}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 16px 12px",borderBottom:`1px solid ${border}`}}>
        <div style={{fontWeight:800,fontSize:20,color:text}}>History</div>
        <button onClick={clear} style={{fontSize:12,color:"#ef4444",background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontWeight:600}}>Clear All</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
        {history.map((item,i)=>(
          <div key={item.id||i} style={{background:card,borderRadius:14,border:`1px solid ${border}`,marginBottom:12,overflow:"hidden"}}>
            <div onClick={()=>setExpanded(expanded===i?null:i)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:text,display:"flex",alignItems:"center",gap:6}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6c3bfb" strokeWidth="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4z" strokeLinecap="round"/></svg>
                  {item.topic}
                </div>
                <div style={{display:"flex",gap:5,marginTop:6}}>{item.platforms?.slice(0,6).map(pid=><Logo key={pid} pid={pid} size={18}/>)}</div>
                <div style={{fontSize:11,color:sub,marginTop:4}}>{new Date(item.savedAt).toLocaleString()}</div>
              </div>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6c3bfb" strokeWidth="2.5"><polyline points={expanded===i?"18 15 12 9 6 15":"6 9 12 15 18 9"}/></svg>
            </div>
            {expanded===i && (
              <div style={{borderTop:`1px solid ${border}`,padding:"10px 14px"}}>
                {item.platforms?.map(pid=>{
                  const d=item.results?.[pid];if(!d) return null;
                  const pdef=PLATFORMS.find(p=>p.id===pid);
                  return (
                    <div key={pid} style={{marginBottom:8,padding:"8px 10px",background:dark?"#2a2a2a":"#faf8ff",borderRadius:10,border:`1px solid ${border}`}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}><Logo pid={pid} size={18}/><span style={{fontWeight:700,fontSize:12,color:pdef?.color}}>{pid.toUpperCase()}</span></div>
                        <CopyBtn text={Object.values(d).join("\n")} small/>
                      </div>
                      <div style={{fontSize:12,color:sub,lineHeight:1.5}}>{Object.values(d).join(" ").slice(0,100)}…</div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Saved ─────────────────────────────────────────────────────────────────────
function SavedScreen({dark}) {
  const [saved,setSaved] = useState(()=>{try{return JSON.parse(localStorage.getItem("sg_saved")||"[]");}catch{return [];}});
  const bg=dark?"#0f0f0f":"#fafafa",card=dark?"#1e1e1e":"#fff",border=dark?"#333":"#e8e0ff",text=dark?"#f0f0f0":"#1a1a2e",sub=dark?"#888":"#555";
  const remove=id=>{const u=saved.filter(x=>x.id!==id);setSaved(u);localStorage.setItem("sg_saved",JSON.stringify(u));};
  if(!saved.length) return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",alignItems:"center",justifyContent:"center",background:bg}}>
      <div style={{width:72,height:72,borderRadius:20,background:dark?"#2a2a2a":"#f0ebff",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:16}}>
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#6c3bfb" strokeWidth="1.5"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
      </div>
      <div style={{fontWeight:700,fontSize:18,color:text}}>Nothing Saved</div>
      <div style={{fontSize:14,color:sub,marginTop:6}}>Tap Save on Results to bookmark content</div>
    </div>
  );
  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden",background:bg}}>
      <div style={{padding:"20px 16px 12px",borderBottom:`1px solid ${border}`,fontWeight:800,fontSize:20,color:text}}>Saved</div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
        {saved.map(item=>(
          <div key={item.id} style={{background:card,borderRadius:14,border:`1px solid ${border}`,marginBottom:12,padding:"12px 14px"}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:text,marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#E60023" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  {item.topic}
                </div>
                <div style={{display:"flex",gap:5,marginBottom:6}}>{item.platforms?.map(pid=><Logo key={pid} pid={pid} size={22}/>)}</div>
                <div style={{fontSize:11,color:sub}}>{new Date(item.savedAt).toLocaleString()}</div>
              </div>
              <button onClick={()=>remove(item.id)} style={{background:"none",border:"none",cursor:"pointer",padding:4}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ccc" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${dark?"#333":"#f5f0ff"}`}}>
              <CopyBtn text={item.platforms?.map(pid=>`--- ${pid.toUpperCase()} ---\n${Object.values(item.results?.[pid]||{}).join("\n")}`).join("\n\n")}/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Settings ──────────────────────────────────────────────────────────────────
function SettingsScreen({dark, setDark}) {
  const [notifs,setNotifs] = useState(true);
  const bg=dark?"#0f0f0f":"#fafafa",card=dark?"#1e1e1e":"#fff",border=dark?"#333":"#e8e0ff",text=dark?"#f0f0f0":"#1a1a2e",sub=dark?"#888":"#555",iconBg=dark?"#2a2a2a":"#f0ebff";

    <div onClick={onToggle} style={{width:46,height:26,borderRadius:13,background:on?"#6c3bfb":"#ccc",cursor:"pointer",position:"relative",transition:"background .25s",flexShrink:0}}>
      <div style={{width:22,height:22,borderRadius:"50%",background:"#fff",position:"absolute",top:2,left:on?22:2,transition:"left .25s",boxShadow:"0 1px 4px #0003"}}/>

              {icon==="moon"  && <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6c3bfb" strokeWidth="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>}
              {icon==="bell"  && <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6c3bfb" strokeWidth="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>}
              {icon==="globe" && <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6c3bfb" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20" strokeLinecap="round"/></svg>}
              {icon==="info"  && <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6c3bfb" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>}

        {/* ── Privacy Policy ── */}
